<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form action="/actrion">
        <div>
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Write your name">
        </div>
        <div>
            <label for="email">Name:</label>
            <input type="text" name="email" id="email" placeholder="Write your email">
        </div>
        <div>
            <label for="message">Message:</label>
        </div>
        <div>
            <textarea name="message" id="message" rows="5" cols="30"></textarea>
        </div>
        <div>
            <label>Rate us out of 5:</label>
            <br>
            <input type="radio" name="rate" id="1">
            <label for="1">1</label>
            <br>
            <input type="radio" name="rate" id="2">
            <label for="2">2</label>
            <br>
            <input type="radio" name="rate" id="3">
            <label for="3">3</label>
            <br>
            <input type="radio" name="rate" id="4">
            <label for="4">4</label>
            <br>
            <input type="radio" name="rate" id="5">
            <label for="5">5</label>
        </div>
        <button type="submit">Send your message!</button>
    </form>
</body>
</html>
